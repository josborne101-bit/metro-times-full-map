<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMATA Interactive System Map</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --border: #333;
            --RD: #e21833; --BL: #0076c0; --OR: #f38f1d;
            --SV: #aadaff; --GR: #00a650; --YL: #ffd200;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        #map-container { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background: #1a1a1a; cursor: grab; }
        svg { width: 1200px; height: auto; padding: 50px; } /* Adjust width as you add more stations */

        .station-dot { fill: #fff; stroke: #000; stroke-width: 2; cursor: pointer; transition: r 0.2s; }
        .station-dot:hover, .station-dot.active { r: 10; fill: #007aff; stroke: white; }

        .line { fill: none; stroke-width: 8; stroke-linecap: round; opacity: 0.8; }
        .RD { stroke: var(--RD); } .GR { stroke: var(--GR); } .YL { stroke: var(--YL); }
        .BL { stroke: var(--BL); } .OR { stroke: var(--OR); } .SV { stroke: var(--SV); }

        #details-panel {
            position: fixed; bottom: -100%; left: 0; right: 0; background: var(--card);
            height: 50vh; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0;
            padding: 20px; transition: bottom 0.4s cubic-bezier(0, 1, 0.5, 1); z-index: 100;
        }
        #details-panel.open { bottom: 0; }
        #panel-content { overflow-y: auto; height: 80%; margin-top: 15px; }

        .train-row { display: grid; grid-template-columns: 45px 1fr 45px 60px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .line-pill { width: 30px; height: 20px; border-radius: 4px; text-align: center; font-size: 0.75rem; font-weight: bold; line-height: 20px; }
        .cars { color: #eee; font-weight: 600; text-align: center; }
        .time { text-align: right; font-weight: bold; color: #4cd964; }
        .time.imminent { color: #ff3b30; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="map-container">
        <svg viewBox="0 0 1000 800">
            <path class="line RD" d="M 100,200 L 900,200" />
            
            <circle class="station-dot" cx="100" cy="200" data-code="A15" /> <circle class="station-dot" cx="200" cy="200" data-code="A01" /> <circle class="station-dot" cx="300" cy="200" data-code="B01" /> <circle class="station-dot" cx="400" cy="200" data-code="B11" /> </svg>
    </div>

    <div id="details-panel">
        <h2 id="station-title" style="margin:0">Select a Station</h2>
        <div id="panel-content">Select a dot on the map to see live times.</div>
    </div>

    <script>
        // FULL SYSTEM STATION DATA (2026)
        const STATIONS = {
            "A01": "Metro Center", "A02": "Farragut North", "A03": "Dupont Circle", "A04": "Woodley Park", "A05": "Cleveland Park", "A06": "Van Ness-UDC", "A07": "Tenleytown-AU", "A08": "Friendship Heights", "A09": "Bethesda", "A10": "Medical Center", "A11": "Grosvenor-Strathmore", "A12": "North Bethesda", "A13": "Twinbrook", "A14": "Rockville", "A15": "Shady Grove",
            "B01": "Gallery Place", "B02": "Judiciary Square", "B03": "Union Station", "B04": "Rhode Island Ave", "B05": "Brookland-CUA", "B06": "Fort Totten", "B07": "Takoma", "B08": "Silver Spring", "B09": "Forest Glen", "B10": "Wheaton", "B11": "Glenmont", "B35": "NoMa-Gallaudet",
            "C01": "Metro Center", "C02": "McPherson Sq", "C03": "Farragut West", "C04": "Foggy Bottom-GWU", "C05": "Rosslyn", "C06": "Arlington Cemetery", "C07": "Pentagon", "C08": "Pentagon City", "C09": "Crystal City", "C10": "National Airport", "C11": "Potomac Yard", "C12": "Braddock Road", "C13": "King St-Old Town", "C14": "Eisenhower Ave", "C15": "Huntington",
            "D01": "Federal Triangle", "D02": "Smithsonian", "D03": "L'Enfant Plaza", "D04": "Federal Center SW", "D05": "Capitol South", "D06": "Eastern Market", "D07": "Potomac Ave", "D08": "Stadium-Armory", "D09": "Minnesota Ave", "D10": "Deanwood", "D11": "Cheverly", "D12": "Landover", "D13": "New Carrollton",
            "E01": "Mt Vernon Sq", "E02": "Shaw-Howard U", "E03": "U Street", "E04": "Columbia Heights", "E05": "Georgia Ave-Petworth", "E06": "Fort Totten", "E07": "West Hyattsville", "E08": "Hyattsville Crossing", "E09": "College Park-U of Md", "E10": "Greenbelt",
            "F01": "Gallery Place", "F02": "Archives", "F03": "L'Enfant Plaza", "F04": "Waterfront", "F05": "Navy Yard-Ballpark", "F06": "Anacostia", "F07": "Congress Heights", "F08": "Southern Ave", "F09": "Naylor Road", "F10": "Suitland", "F11": "Branch Ave",
            "G01": "Benning Road", "G02": "Capitol Heights", "G03": "Addison Road", "G04": "Morgan Boulevard", "G05": "Downtown Largo",
            "J02": "Van Dorn Street", "J03": "Franconia-Springfield",
            "K01": "Court House", "K02": "Clarendon", "K03": "Virginia Sq-GMU", "K04": "Ballston-MU", "K05": "East Falls Church", "K06": "West Falls Church", "K07": "Dunn Loring", "K08": "Vienna",
            "N01": "McLean", "N02": "Tysons", "N03": "Greensboro", "N04": "Spring Hill", "N06": "Wiehle-Reston East", "N07": "Reston Town Center", "N08": "Herndon", "N09": "Innovation Center", "N10": "Dulles Airport", "N11": "Loudoun Gateway", "N12": "Ashburn"
        };

        let currentCode = null;
        let refreshTimer = null;

        // Interaction Logic
        document.querySelectorAll('.station-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('.station-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                currentCode = dot.getAttribute('data-code');
                document.getElementById('station-title').innerText = STATIONS[currentCode];
                document.getElementById('details-panel').classList.add('open');
                
                fetchTrains();
                clearInterval(refreshTimer);
                refreshTimer = setInterval(fetchTrains, 20000);
            });
        });

        async function fetchTrains() {
            if (!currentCode) return;
            const container = document.getElementById('panel-content');
            try {
                const response = await fetch(`https://metro-proxy.josborne101.workers.dev?stations=${currentCode}`);
                const data = await response.json();
                renderTrains(data.Trains);
            } catch (e) {
                container.innerHTML = "Error loading data.";
            }
        }

        function renderTrains(trains) {
            const container = document.getElementById('panel-content');
            if (!trains || trains.length === 0) {
                container.innerHTML = "No trains found.";
                return;
            }
            let html = '';
            trains.forEach(t => {
                const isImminent = t.Min === "ARR" || t.Min === "BRD";
                html += `
                <div class="train-row">
                    <div class="line-pill ${t.Line}">${t.Line}</div>
                    <div style="padding-left:10px">${t.DestinationName}</div>
                    <div class="cars">${t.Car || ''}</div>
                    <div class="time ${isImminent ? 'imminent' : ''}">${isImminent ? t.Min : t.Min + 'm'}</div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Close panel when clicking background
        document.getElementById('map-container').addEventListener('click', (e) => {
            if (e.target.tagName === 'svg') {
                document.getElementById('details-panel').classList.remove('open');
                clearInterval(refreshTimer);
            }
        });
    </script>
</body>
</html>
