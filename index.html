<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Times - System List</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --border: #333;
            --RD: #e21833; --BL: #0076c0; --OR: #f38f1d;
            --SV: #aadaff; --GR: #00a650; --YL: #ffd200;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px 15px 10px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        h1 { font-size: 1.4rem; margin: 0 0 10px 0; }

        #search-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        #station-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .station-item {
            padding: 18px 0;
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        /* Slide-up Panel */
        #details-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--card);
            height: 60vh;
            border-top: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        #details-panel.open { bottom: 0; }

        .handle {
            width: 40px; height: 5px; background: #444;
            border-radius: 5px; margin: 0 auto 15px;
        }

        .train-row {
            display: grid;
            grid-template-columns: 45px 1fr 45px 60px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .line-pill {
            width: 32px; height: 20px; border-radius: 4px;
            text-align: center; font-size: 0.75rem; font-weight: bold; line-height: 20px;
        }

        .RD { background: var(--RD); color: white; }
        .BL { background: var(--BL); color: white; }
        .OR { background: var(--OR); color: white; }
        .SV { background: var(--SV); color: black; }
        .GR { background: var(--GR); color: white; }
        .YL { background: var(--YL); color: black; }

        .cars { color: #eee; font-weight: 600; text-align: center; }
        .time { text-align: right; font-weight: bold; color: #4cd964; }
        .time.imminent { color: #ff3b30; animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #close-btn {
            background: #333; border: none; color: white;
            padding: 8px 15px; border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🚇 Metro Times</h1>
        <input type="text" id="search-input" placeholder="Search stations...">
    </header>

    <div id="station-list"></div>

    <div id="details-panel">
        <div class="handle"></div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="station-title" style="margin:0">Station</h2>
            <button id="close-btn">Close</button>
        </div>
        <div id="panel-content" style="overflow-y:auto; flex:1; margin-top:15px;"></div>
    </div>

    <script>
        const STATIONS = {
            "A01": "Metro Center", "A02": "Farragut North", "A03": "Dupont Circle", "A04": "Woodley Park", "A05": "Cleveland Park", "A06": "Van Ness-UDC", "A07": "Tenleytown-AU", "A08": "Friendship Heights", "A09": "Bethesda", "A10": "Medical Center", "A11": "Grosvenor-Strathmore", "A12": "North Bethesda", "A13": "Twinbrook", "A14": "Rockville", "A15": "Shady Grove",
            "B01": "Gallery Place", "B02": "Judiciary Square", "B03": "Union Station", "B04": "Rhode Island Ave", "B05": "Brookland-CUA", "B06": "Fort Totten", "B07": "Takoma", "B08": "Silver Spring", "B09": "Forest Glen", "B10": "Wheaton", "B11": "Glenmont", "B35": "NoMa-Gallaudet",
            "C01": "Metro Center", "C02": "McPherson Sq", "C03": "Farragut West", "C04": "Foggy Bottom-GWU", "C05": "Rosslyn", "C06": "Arlington Cemetery", "C07": "Pentagon", "C08": "Pentagon City", "C09": "Crystal City", "C10": "National Airport", "C11": "Potomac Yard", "C12": "Braddock Road", "C13": "King St-Old Town", "C14": "Eisenhower Ave", "C15": "Huntington",
            "D01": "Federal Triangle", "D02": "Smithsonian", "D03": "L'Enfant Plaza", "D04": "Federal Center SW", "D05": "Capitol South", "D06": "Eastern Market", "D07": "Potomac Ave", "D08": "Stadium-Armory", "D09": "Minnesota Ave", "D10": "Deanwood", "D11": "Cheverly", "D12": "Landover", "D13": "New Carrollton",
            "E01": "Mt Vernon Sq", "E02": "Shaw-Howard U", "E03": "U Street", "E04": "Columbia Heights", "E05": "Georgia Ave-Petworth", "E06": "Fort Totten", "E07": "West Hyattsville", "E08": "Hyattsville Crossing", "E09": "College Park-U of Md", "E10": "Greenbelt",
            "F01": "Gallery Place", "F02": "Archives", "F03": "L'Enfant Plaza", "F04": "Waterfront", "F05": "Navy Yard-Ballpark", "F06": "Anacostia", "F07": "Congress Heights", "F08": "Southern Ave", "F09": "Naylor Road", "F10": "Suitland", "F11": "Branch Ave",
            "G01": "Benning Road", "G02": "Capitol Heights", "G03": "Addison Road", "G04": "Morgan Boulevard", "G05": "Downtown Largo",
            "J02": "Van Dorn Street", "J03": "Franconia-Springfield",
            "K01": "Court House", "K02": "Clarendon", "K03": "Virginia Sq-GMU", "K04": "Ballston-MU", "K05": "East Falls Church", "K06": "West Falls Church", "K07": "Dunn Loring", "K08": "Vienna",
            "N01": "McLean", "N02": "Tysons", "N03": "Greensboro", "N04": "Spring Hill", "N06": "Wiehle-Reston East", "N07": "Reston Town Center", "N08": "Herndon", "N09": "Innovation Center", "N10": "Dulles Airport", "N11": "Loudoun Gateway", "N12": "Ashburn"
        };

        let currentCode = null;
        let timer = null;

        const list = document.getElementById('station-list');
        const search = document.getElementById('search-input');
        
        // Sort alphabetically
        const sorted = Object.entries(STATIONS).sort((a,b) => a[1].localeCompare(b[1]));

        function render(filter = "") {
            list.innerHTML = "";
            sorted.forEach(([code, name]) => {
                if(name.toLowerCase().includes(filter.toLowerCase())) {
                    const item = document.createElement('div');
                    item.className = 'station-item';
                    item.innerHTML = `<span>${name}</span><span style="color:#555">›</span>`;
                    item.onclick = () => {
                        currentCode = code;
                        document.getElementById('station-title').innerText = name;
                        document.getElementById('details-panel').classList.add('open');
                        update();
                        clearInterval(timer);
                        timer = setInterval(update, 20000);
                    };
                    list.appendChild(item);
                }
            });
        }

        async function update() {
            if(!currentCode) return;
            const content = document.getElementById('panel-content');
            try {
                const res = await fetch(`https://metro-proxy.josborne101.workers.dev?stations=${currentCode}`);
                const data = await res.json();
                content.innerHTML = data.Trains.map(t => {
                    const imm = t.Min === "ARR" || t.Min === "BRD";
                    return `
                    <div class="train-row">
                        <div class="line-pill ${t.Line}">${t.Line}</div>
                        <div style="padding-left:10px">${t.DestinationName}</div>
                        <div class="cars">${t.Car || ''}</div>
                        <div class="time ${imm ? 'imminent' : ''}">${imm ? t.Min : t.Min+'m'}</div>
                    </div>`;
                }).join('') || "No trains found.";
            } catch(e) { content.innerHTML = "Error loading."; }
        }

        search.oninput = (e) => render(e.target.value);
        document.getElementById('close-btn').onclick = () => {
            document.getElementById('details-panel').classList.remove('open');
            clearInterval(timer);
        };

        render();
    </script>
</body>
</html>
