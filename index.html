<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Times - System List</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --border: #333;
            --accent: #007aff;
            --RD: #e21833; --BL: #0076c0; --OR: #f38f1d;
            --SV: #aadaff; --GR: #00a650; --YL: #ffd200;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px 15px 10px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 { font-size: 1.6rem; margin: 0 0 15px 0; }

        #search-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        #station-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .station-item {
            padding: 18px 0;
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .station-item:active { background: #1a1a1a; }

        .chevron { color: #555; font-weight: bold; }

        /* Slide-up Panel */
        #details-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--card);
            height: 60vh;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
            transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 100;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #details-panel.open { bottom: 0; }

        .handle {
            width: 40px; height: 5px; background: #444;
            border-radius: 5px; margin: 0 auto 15px;
        }

        #panel-content { overflow-y: auto; flex: 1; }

        .train-row {
            display: grid;
            grid-template-columns: 45px 1fr 45px 60px;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
